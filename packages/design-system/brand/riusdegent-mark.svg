<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="riusdegent — marca">
  <title>riusdegent — marca (rius de gent)</title>
  <desc>Símbol hidrogràfic: línies de cabal que travessen una divisòria vertical. A l'esquerra el riu va ple (corrent gruixut); a la dreta s'asseca (les línies s'aprimen i es trenquen en un llit puntejat). El riu creix i s'asseca alhora: sobrepressió i despoblació. Colors dels tokens datapoble (teal de carena + terracota).</desc>

  <!-- Tokens aplicats (no redefinits):
       teal de carena  dp-teal       #2A7B7B  (l'aigua / el cabal)
       terracota       dp-accent-500 #C75D34  (el detall humà / la divisòria)
       slate           dp-neutral-700 #3C4756  (suport)
       Sistema de coordenades: la divisoria a x=48 (centre). -->

  <!-- Divisòria (la línia que parteix les aigües) -->
  <line x1="48" y1="12" x2="48" y2="84" stroke="#C75D34" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Vessant PLE (esquerra): el riu amb cabal, traços continus i gruixuts -->
  <g fill="none" stroke="#2A7B7B" stroke-linecap="round">
    <path d="M10 30 C 22 24, 34 24, 46 30" stroke-width="4.5"/>
    <path d="M8 42 C 22 35, 34 35, 46 41"  stroke-width="6"/>
    <path d="M8 54 C 22 47, 34 47, 46 53"  stroke-width="6"/>
    <path d="M10 66 C 22 60, 34 60, 46 66" stroke-width="4.5"/>
  </g>

  <!-- Vessant SEC (dreta): el mateix riu s'asseca, traços que s'aprimen i es trenquen -->
  <g fill="none" stroke="#2A7B7B" stroke-linecap="round">
    <path d="M50 30 C 60 24, 70 24, 78 28" stroke-width="3"/>
    <path d="M50 41 C 62 35, 72 36, 84 33" stroke-width="3.5"/>
  </g>
  <!-- llit del riu eixut: el corrent es desfà en punts (despoblació) -->
  <g fill="none" stroke="#2A7B7B" stroke-linecap="round" stroke-width="3" stroke-dasharray="0.1 8">
    <path d="M50 53 C 62 47, 72 48, 86 45"/>
    <path d="M50 66 C 60 61, 68 62, 80 60"/>
  </g>
</svg>
