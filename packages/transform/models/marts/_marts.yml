version: 2

models:
  - name: mart_municipi
    description: >
      1 fila per municipi del Berguedà (clau ine5). Columnes segons el contracte
      semantic/metrics.yml (table: mart_municipi). IETR/IETR_rank es calculen amb
      la metodologia de Talaia (min-max winsoritzat p5/p95, dues dimensions a pesos
      iguals). pct_icaen_EFG segueix NULL (requereix connector ICAEN, fora d'aquest PR).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join del contracte).
        data_tests:
          - unique
          - not_null
      - name: codi6
        description: Codi Idescat de 6 dígits (INE5 + dígit de control).
        data_tests:
          - not_null
      - name: municipi
        description: Nom oficial del municipi.
        data_tests:
          - not_null
      - name: poblacio
        description: Població empadronada (Idescat EMEX 2025).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: hab_total
        description: Habitatges familiars totals (Cens 2021).
        data_tests:
          - not_null
      - name: hab_principal
        description: Habitatges familiars principals (Cens 2021).
      - name: hab_noprincipal
        description: Habitatges familiars no principals (Cens 2021).
      - name: pct_noprincipal
        description: "% habitatge no principal sobre el total. 0-100."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: hab_per_hab
        description: Habitatges per habitant (ràtio).
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: index_envelliment
        description: Població 65+ per cada 100 de 0-14.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_total
        description: Establiments turístics reglats d'alta (RTC).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_hut
        description: Subconjunt d'habitatges d'ús turístic (HUT).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_per_1000hab
        description: Establiments per 1000 habitants.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_per_100hab_viv
        description: Establiments per 100 habitatges.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: kg_hab_any
        description: Residus kg/hab/any (ARC, darrer any = 2024).
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      # --- Senyals físics per càpita (inputs de les 3 capes) ---
      - name: kwh_hab
        description: >
          Consum elèctric domèstic kWh/hab del darrer any ple (2024, sector USOS
          DOMÈSTICS). Senyal de la capa L1 (pernocta).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: vidre_hab
        description: >
          Vidre kg/hab/any del darrer any (fracció ARC 69zu-w48s). Senyal de la
          capa L3 (pressió turística/hostaleria). Cobertura 31/31.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      # --- 2n proxy d'hostaleria de la capa L3 (restauració, OSM) ---
      - name: restauracio_estab
        description: >
          Nombre de locals de restauració (CCAE-56) mapejats a OSM, assignats al
          municipi per punt-en-polígon (geometria real). 2n proxy d'hostaleria
          (capacitat), complement del vidre. MÍNIM observat, no cens: OSM
          infra-mapeja el rural (alguns micromunicipis surten 0). Absència → 0.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: restauracio_per_1000hab
        description: >
          Densitat d'establiments de restauració per 1000 hab (restauracio_estab /
          poblacio * 1000). Validat com a 2n proxy independent del vidre
          (Spearman ≈ 0,54 amb vidre_hab i index_turisme, N=31). Hereta el caveat
          de completesa d'OSM.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      # --- INDICADOR ESTRELLA: MODEL DE 3 CAPES (INFERÈNCIA, no cens) ---
      # L1 · població pernocta (elèctric/base_electric) — la nova «població invisible».
      - name: poblacio_pernocta_est
        description: >
          L1. Població que DORM al territori sense constar al padró:
          round(poblacio * kwh_hab / base_electric), base_electric=1224. Senyal =
          elèctric domèstic. Inferència; rang + caveat (semantic/metrics.yml).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: gap_pernocta
        description: "L1. poblacio_pernocta_est − poblacio. Pot ser negatiu."
        data_tests:
          - not_null
      - name: gap_pernocta_pct
        description: "L1. gap_pernocta / poblacio * 100 (percentatge 0-100; +12 = +12%)."
        data_tests:
          - not_null
      # L2 · càrrega humana total (residus/base_residencial) — inclou visitants de dia.
      - name: carrega_total_est
        description: >
          L2. Càrrega humana total (residents + visitants de DIA):
          round(poblacio * kg_hab_any / base_residencial), base=410. NO és població
          (els residus de les viles porten part de comerç). Era poblacio_real_est.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      # L3 · pressió turística (vidre, z-score comarcal 0-100) — NO és població.
      - name: index_turisme
        description: >
          L3. Pressió turística/hostaleria: z-score comarcal de vidre_hab portat a
          0–100 (50 = mitjana comarcal). Proxy d'activitat de visitants, NO població.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      # --- Compatibilitat (model anterior d'una capa) ---
      - name: poblacio_real_est
        description: >
          ÀLIES de carrega_total_est (mateixa fórmula residus/410). REENQUADRAT: és
          càrrega humana total, NO «població». Es conserva per no trencar consumidors.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: gap_abs
        description: >
          carrega_total_est − poblacio (gap de càrrega, no de pernocta). Pot ser
          negatiu. Es conserva per compatibilitat; per la població invisible, gap_pernocta.
        data_tests:
          - not_null
      - name: gap_pct
        description: "gap_abs / poblacio * 100 (percentatge 0-100). Compat; vegeu gap_pernocta_pct per L1."
        data_tests:
          - not_null
      - name: poblacio_real_rel
        description: >
          Presència estimada (tall RELATIU, base comarcal=452): vista espacial
          "qui acull més DINS la comarca" (≈ suma zero). Opcional.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: confianca
        description: >
          Bandera de confiança de l'estimació (alta/mitjana/baixa). baixa als
          micro-munis (poblacio<75, secret estadístic) i on els senyals
          divergeixen; alta quan residus i un corroborador (elèctric/càpita o
          % no principal) superen la mediana comarcal. Honestedat abans que
          precisió falsa.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["alta", "mitjana", "baixa"]
      - name: pct_icaen_EFG
        description: "% certificats E-G (ICAEN). NULL: connector pendent."
      - name: IETR
        description: >
          Índex d'Exposició Turística-Residencial (0-100). Min-max winsoritzat
          (p5/p95) sobre els 31 municipis, eix residencial + eix turístic a pesos
          iguals. Ancoratges: Castellar (08052) ≈ 89,4 (#1); Berga (08022) ≈ 0,3 (#31).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: IETR_rank
        description: "Rànquing IETR (1 = major exposició). Únic i not_null."
        data_tests:
          - unique
          - not_null
      # --- FASE 1 · 3 derivats nous (endurir el model SENSE fonts noves) ---
      - name: IETR_stock
        description: >
          IETR dual · component ESTRUCTURAL/resident (A_resid reescalat 0-100):
          habitatge no principal + habitatges per habitant. Exposició latent. 0-100.
          Identitat: round(0.5*IETR_stock + 0.5*IETR_impact, 2) == IETR.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: IETR_impact
        description: >
          IETR dual · component de PRESSIÓ realitzada (B_turis reescalat 0-100):
          RTC per 1000 hab + per 100 habitatges. Pressió viva. 0-100.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: tipologia
        description: >
          Classificació amb NOM de com s'habita el municipi (LECTURA, no cens),
          per regles sobre z-scores comarcals: dormitori_invisible · excursio ·
          segona_residencia · capital_serveis · buit_administratiu · indeterminat
          (on és ambigu). Verificat: Berga=capital_serveis, Castellar=excursio,
          Gósol/Saldes=segona_residencia. Vegeu docs/tipologia-municipal.md.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - dormitori_invisible
                  - excursio
                  - segona_residencia
                  - capital_serveis
                  - buit_administratiu
                  - indeterminat
      - name: confianca_score
        description: >
          Puntuació auditable 0-100 de fiabilitat (complementa la bandera
          `confianca`): mida del denominador + concordança dels senyals físics +
          cobertura − outlier. Etiqueta derivable (<45 baixa · 45–65 mitjana ·
          ≥65 alta). Vegeu docs/tipologia-municipal.md.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: kg_hab_any_year
        description: Any del tall de residus (traçabilitat temporal).
      - name: vidre_any
        description: Any del tall de la fracció vidre (traçabilitat temporal).

  - name: mart_consum_electric
    description: >
      Sèrie de consum elèctric DOMÈSTIC per municipi × any (format llarg, clau
      ine5+any_consum), Berguedà 2013–2024 (31×12 = 372 files). Font ICAEN
      8idm-becu, sector USOS DOMÈSTICS (l'únic que sobreviu al secret estadístic
      a micromunicipis). Proxy de presència per a "població real vs padró"
      (docs/poblacio-real-fonts.md). NO normalitzat: consum brut anual, fidel a
      la font; la normalització i el *gap* són síntesi de Talaia (fora d'aquest PR).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join amb mart_municipi).
        data_tests:
          - not_null
      - name: codi6
        description: Codi Idescat de 6 dígits (de mart_municipi).
        data_tests:
          - not_null
      - name: municipi
        description: Nom oficial del municipi.
        data_tests:
          - not_null
      - name: any_consum
        description: Any de la dada de consum (2013–2024).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 2013, max_value: 2024 }
      - name: consum_kwh_domestic
        description: Consum elèctric del sector USOS DOMÈSTICS (kWh/any).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 1000000000 }

  - name: mart_electoral
    description: >
      Resultats electorals agregats per municipi (clau ine5), Parlament de
      Catalunya 2024 (A20241) i 2021 (A20211), Berguedà. Columnes amb sufix de
      convocatòria. Percentatges sobre vot vàlid (suma de candidatures).
      LECTURA ECOLÒGICA: agregat municipal, NO individual (falàcia ecològica);
      volàtil en micromunicipis. Classificació de blocs (extrema dreta / indep /
      esquerra) segons la metodologia de Talaia; vegeu bitàcora. Ancoratge
      verificat (Castellar 08052, 2024): guanya=CAT-JUNTS+, pct_indep≈84,
      pct_extrema_dreta≈27 (Vox + Aliança Catalana).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join amb mart_municipi; crosswalk aplicat).
        data_tests:
          - unique
          - not_null
      - name: municipi
        description: Nom oficial del municipi (de mart_municipi).
        data_tests:
          - not_null
      # --- Parlament 2024 ---
      - name: vots_valids_A20241
        description: Vot vàlid (suma de candidatures) · Parlament 2024.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pct_extrema_dreta_A20241
        description: "% extrema dreta (Vox + Aliança Catalana + PxC…) sobre vot vàlid · 2024."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_indep_A20241
        description: "% bloc independentista sobre vot vàlid · 2024."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_esq_A20241
        description: "% bloc d'esquerra sobre vot vàlid · 2024."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: guanya_A20241
        description: Candidatura més votada (sigla) · 2024.
        data_tests:
          - not_null
      # --- Parlament 2021 ---
      - name: vots_valids_A20211
        description: Vot vàlid (suma de candidatures) · Parlament 2021.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pct_extrema_dreta_A20211
        description: "% extrema dreta sobre vot vàlid · 2021."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_indep_A20211
        description: "% bloc independentista sobre vot vàlid · 2021."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_esq_A20211
        description: "% bloc d'esquerra sobre vot vàlid · 2021."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: guanya_A20211
        description: Candidatura més votada (sigla) · 2021.
        data_tests:
          - not_null
