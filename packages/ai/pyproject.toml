[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datapoble-ai"
version = "0.1.0"
description = "Brúixola — traceable text-to-SQL agent over the datapoble semantic contract (OpenRouter, offline-first)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Brúixola", email = "bruixola@datapoble.local" }]
dependencies = [
    "pyyaml>=6.0",
    "duckdb>=1.0",
    "pydantic>=2.0",
    "fastapi>=0.110",
]

[project.optional-dependencies]
# The LLM path. Inert (and unimported) until OPENROUTER_API_KEY is provided.
openrouter = ["openai>=1.30"]
# Local dev / CI.
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
    "uvicorn>=0.29",
    "httpx>=0.27",            # FastAPI TestClient
]

[project.scripts]
datapoble-ai = "datapoble_ai.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/datapoble_ai"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"

[tool.ruff]
src = ["src"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line length handled by formatter; prose comments may run long
    "UP042",  # (str, Enum) is intentional: stable JSON values for the API/evals
]
