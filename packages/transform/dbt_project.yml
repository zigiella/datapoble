name: "datapoble_transform"
version: "0.1.0"
config-version: 2

profile: "datapoble"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Variables d'execució. comarca = filtre del pilot (escala a Catalunya = canviar
# aquest valor i regenerar la raw amb tota Catalunya, fora d'aquest PR).
vars:
  # comarca: literal del pilot (ja NO s'usa al mart_municipi, que pren la comarca per muni de
  # stg_residus). Es manté per als marts encara acotats (electoral/demografia, pendents de F3).
  comarca: "Berguedà"
  # Escala Catalunya (F2): mart_municipi cobreix tots els munis amb senyal EMEX.
  n_municipis_expected: 947
  # arrel de la raw, relativa a packages/transform (on s'invoca dbt)
  raw_root: "../../data/raw"
  marts_root: "../../data/marts"
  # arrel de dades territorials versionades (registre, Nivell C): pont Python→dbt (F2)
  territorial_root: "../../data/territorial"
  # --- Indicador estrella: MODEL DE 3 CAPES (mètode de Talaia, validat sobre dades) ---
  # Tres senyals físics independents per municipi, cadascun amb la seva BASE = la
  # generació d'un resident "normal" (viles de vall poc turístiques, IETR<5: Avià,
  # Berga, Gironella, Puig-reig; pop-ponderades). Totes PARAMETRITZABLES: a escala
  # Catalunya seran per COMARCA, no una sola (§8 del mètode).
  #
  # base_residencial (RESIDUS, kg/hab/any) = 410 (observat IETR<5; estable: 410 amb
  #   IETR<12). Denominador de la capa L2 «càrrega humana total».
  # base_electric (ELÈCTRIC DOMÈSTIC, kWh/hab/any del darrer any ple) = 1224
  #   (pop-pond IETR<5: 1224,1; estable: 1232 amb IETR<12). Denominador de la capa
  #   L1 «població pernocta». Recalculat sobre dades 2024 (sector USOS DOMÈSTICS).
  # base_vidre (VIDRE, kg/hab/any) = 26.5 (pop-pond IETR<5; estable: 26,8 amb IETR<12).
  #   Generació de vidre d'un resident normal. Referència de la capa L3 (vidre_ratio).
  base_residencial: 410
  base_electric: 1224
  base_vidre: 26.5
  # base_comarcal: mitjana comarcal pop-ponderada = 452. TALL RELATIU (redistribució
  #   espacial dins la comarca, suma zero). Vista opcional (poblacio_real_rel).
  base_comarcal: 452
  # poblacio_min_confianca: per sota d'aquest padró un municipi és micro (secret
  #   estadístic, soroll de denominador) → confiança SEMPRE baixa.
  poblacio_min_confianca: 75
  # demografia_min_n: LLINDAR MÍNIM N de la capa de composició i arrelament (origen).
  #   Per sota d'aquesta població els percentatges d'origen són soroll (1 persona
  #   mou el % més de 2 punts) o vénen ja suprimits per secret estadístic → NO es
  #   publiquen els percentatges fins (el recompte brut sí, no és secret). Lectura
  #   ECOLÒGICA (municipi, no individus). 50 hab ≈ punt on 1 persona ≤ 2 pp.
  demografia_min_n: 50
  # any_corroborador_electric: darrer any amb cobertura plena del consum domèstic
  #   (31/31, zero forats). És el senyal de la capa L1 (pernocta) i corroborador
  #   secundari de la resta.
  any_corroborador_electric: 2024

models:
  datapoble_transform:
    staging:
      +materialized: view
    marts:
      +materialized: table
