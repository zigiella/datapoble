name: ci

on:
  pull_request:
  push:
    branches: [main]

# CI esqueleto. Cada agente añade su job en su frente (jurisdicción).
# Regla: ningún PR a main con CI en rojo.
jobs:
  structure:
    name: repo structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required foundation files
        run: |
          set -e
          for f in README.md LICENSE CONTRIBUTING.md .gitignore; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done
          echo "foundation OK"

  # Sondeig: gate de dades. dbt build/test complets necessiten data/raw/ (gitignored)
  # → NO reproduïbles en checkout net; aquí corre el que SÍ que ho és, sobre artefactes
  # versionats: ruff + dbt parse (plantilla/schema vàlids) + verificadors offline
  # (ancoratges/Spearman + mirall Fase 1 byte-fidel al parquet). PYTHONUTF8=1: dbt llegeix
  # els fitxers del projecte amb l'encoding del sistema; força UTF-8 (defensa anti-cp1252).
  data:
    name: data marts (dbt parse + verifiers)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (dbt-duckdb + verifiers)
        run: pip install dbt-duckdb duckdb pandas pyarrow pyyaml ruff pytest requests
      - name: Lint (ruff) · transform + ingestion + signals
        run: ruff check packages/transform packages/ingestion packages/signals
      # D1 · connector atur SEPE: 100% OFFLINE sobre les fixtures reals arxivades
      # (bytes exactes del CSV del SEPE). Guarda les esmenes del contracte: filtre
      # pel CATÀLEG sencer (Gósol 25100 i Gombrèn 17080 presents, mai per
      # província), doctrina del «<5» = interval [1,4], zero-pad de codis i
      # byte-match de 3 municipis. --no-deps: el test no necessita dlt.
      - name: D1 · connector atur SEPE (offline, sobre fixtures)
        run: |
          pip install -e packages/ingestion --no-deps
          pytest packages/ingestion/tests/test_atur_sepe.py -q
      # D7 · connector EMEX: l'any de referència HEREDA del node pare (abans `year`
      # sortia NULL a 12 dels 13 indicadors) + els vintages NO són tots el mateix
      # (població 2025 vs habitatges 2021: la base de la frescor, E5) + les franges
      # d'edat quadren amb el total (precondició de la derivació de la 15-64, E12).
      # Offline sobre una resposta real arxivada byte a byte.
      - name: D7 · connector Idescat EMEX (offline, sobre fixtura real)
        run: pytest packages/ingestion/tests/test_idescat_emex.py -q
      - name: Verify mart_pols_mensual (àncores byte-match + doctrina <5 · offline)
        run: python packages/transform/verify_pols_mensual.py
      # D4 · mart_govern: rang «k de n» per comarca recalculat i comparat, comarca de
      # municipis-territori.json, byte-match d'àncores a mà (Pobla/gorra §2), Gombrèn
      # contra el Ripollès (no els 31). Offline, sobre el parquet versionat.
      - name: Verify mart_govern (rang per comarca + àncores a mà · offline)
        run: python packages/transform/verify_govern.py
      # D7 · mart_tendencia (E6): guarda la regla d'honestedat de Bea — cap fletxa sense
      # període, cap Δ inventat, «sense sèrie» EXPLÍCIT amb motiu, i la doctrina del «<5»
      # propagada al delta (interval, no número). Recalcula A MÀ els 1.894 deltes d'atur
      # des de mart_pols_mensual i els compara byte a byte.
      # D10 · dues guardes noves aquí dins: (1) CAP TARGETA DEL TAULER SENSE FILA — el
      # conjunt esperat es DERIVA de l'autoritat del front (src/lib/govern/kpis.js, via
      # tools/tauler_kpis.py) en comptes d'escriure's a mà, perquè escrit a mà divergia en
      # silenci (serveis_estab/restauracio_estab es pintaven i no tenien fila al mart);
      # (2) el motiu de «sense sèrie» ha d'existir EN ELS DOS IDIOMES: el front el pinta
      # literal i traduir-lo allà seria inventar dada.
      - name: Verify mart_tendencia (Δ d'atur a mà + període + cobertura del tauler · offline)
        run: python packages/transform/verify_tendencia.py
      # Suite COMPLETA de `signals`, 100% OFFLINE (fixtures reals arxivades +
      # sessions HTTP falses + parquets versionats; cap crida de xarxa, cap clau).
      # Cobreix: BDNS/R1 (la trampa de les regions NUTS — la pare no cascada),
      # licitacions (conservació de l'import del repartiment comarcal — el vermell
      # que R1 va destapar, arreglat el 2026-07-17: el denominador del per_poblacio
      # prenia la població de TOT el mart quan F2 el va escalar a 947 munis),
      # events, sequera i convergència. L'acotació que R1 va deixar (només el seu
      # fitxer) queda RETIRADA: la porta de main torna a cobrir tota la suite.
      - name: Suite signals (offline, completa)
        run: pytest packages/signals/tests -q
      - name: dbt parse (plantilla + schema vàlids)
        run: dbt parse --project-dir packages/transform --profiles-dir packages/transform
      - name: Verify marts (ancoratges + Spearman)
        run: python packages/transform/verify_marts.py
      - name: Fase 1 · derivats al dia (mirall offline)
        run: python packages/transform/derive_fase1.py --check
      - name: Validació ETCA al dia (Pas 4 · offline)
        run: python tools/validacio_etca.py --check
      - name: Tipus territorial al dia (Pas 4 · Nivell B · offline)
        run: python tools/tipus_territorial.py --check
      - name: Calibració dels intervals al dia (Fase 1 · offline)
        run: python tools/calibracio_intervals.py --check
      - name: Pernocta Catalunya al dia (Nivell C · CA→web · offline)
        run: python tools/export_pernocta_catalunya.py --check
      - name: Partició ETCA↔pernocta al dia (Fase 1 · offline)
        run: python tools/discrepancia_etca_pernocta.py --check
      - name: Senyal <1.000 al dia (els ~99 · tres registres · offline)
        run: python tools/senyal_sub1000.py --check
      - name: Export Licitacions al dia (cabal → web · offline)
        run: python tools/export_licitacions.py --check
      # D10 · el --check també fa córrer les guardes del CATÀLEG (check_catalog): cap clau
      # servida sense valor ni excepció declarada, i cap mètrica amb `frescor.actualitzacio`
      # null que no consti a la llista d'excepcions ESCRITES — que a més caduca sola (si una
      # clau pendent deixa d'estar trencada, la guarda cau i obliga a retirar-la).
      - name: Export web municipis al dia (cabal → web + guardes del catàleg · offline)
        run: |
          python tools/export_web_municipis.py --scope catalunya --check
          python tools/export_web_municipis.py --scope bergueda --check
      # D5 · mode govern: el pont mart_govern → JSON servible (rang comarcal per al front).
      # Sense aquest --check, el JSON versionat es podia desincronitzar en silenci del parquet
      # (el forat que D4/D5 van destapar: D4 emetia parquet, no JSON web). Ownership → Sondeig.
      - name: Export govern web al dia (mart_govern → web · offline)
        run: python tools/export_govern_web.py --check
      # D7 · tauler v2: l'atur (E4) i la tendència (E6) servibles. Neix amb --check CABLAT
      # AQUÍ el mateix dia que l'exportador — no repetim el forat de D4/D5, on el mart
      # existia i el JSON web no, i el --check va haver d'arribar en un PR posterior (#272).
      - name: Export tauler v2 al dia (atur + tendència → web · offline)
        run: python tools/export_tauler_web.py --check

  # Brúixola: evals de la capa de IA (texto→SQL trazable). Corre OFFLINE
  # (sin OPENROUTER_API_KEY): determinista, sin red. Gate anti-regresión.
  ai-evals:
    name: ai evals (offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (+ dev)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src evals tests
      - name: Test suite + eval gate
        run: pytest

  # Geo-RAG (experiment): substrat DuckDB del Berguedà (31 munis). Paquet AÏLLAT
  # (no toca packages/ai). El smoke test reconstrueix el substrat des de fonts
  # versionades (geometria + bandes/σ + registre + bessons + sèrie ICAEN) i comprova
  # que els valors tracen als fitxers font (byte-match) — el «split» és recalculable.
  # OFFLINE a propòsit: NO instal·la els extres [embeddings] (torch) ni [generativa]
  # (openai/OpenRouter), NO baixa pesos i NO crida cap API. Els tests que necessitin clau
  # es salten amb un guard d'entorn (skip si no hi ha OPENROUTER_API_KEY). El secret
  # OPENROUTER_API_KEY existent a GitHub NO es cableja al CI per-PR -> res a filtrar en
  # un repo públic (vegeu el README).
  geo-rag:
    name: geo-rag substrate (experiment · offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/geo-rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (+ dev) + ruff
        run: pip install -e ".[dev]" ruff
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Smoke test (Berguedà substrate byte-fidel)
        run: pytest

  # Mirador: build + type-check del frontend (SvelteKit + TS, i18n Paraglide).
  # npm (hay package-lock.json en packages/web; aún no hay workspace pnpm en raíz).
  # vitest + playwright (a11y) llegan en un PR posterior.
  web:
    name: web build + check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install (npm ci)
        run: npm ci
      - name: Type-check (svelte-check)
        run: npm run check
      # D9: el verificador del TAULER existia des de D8 pero NUNCA corría en CI — una guarda
      # que no se ejecuta decora, no protege (misma lección que el `--check` de export_govern,
      # #272). Guarda la regla de ferro C6 §8.1 (cada KPI con fuente O fórmula) y, desde D9,
      # las reglas de pintura sobre el dato servido: ninguna flecha sin período, ningún
      # 'sense_serie' sin motivo, ningún Δ enmascarado sin intervalo, y el ancla de que el
      # paro pinta SUS DOS comparaciones. Offline: lee `data/web/*.json` versionados.
      - name: Verificador del tauler (procedència + regles de pintura · offline)
        run: npm run verify:govern
      - name: Build (producción)
        run: npm run build

  # TODO(Llegenda): regresión visual (Storybook/Chromatic)
