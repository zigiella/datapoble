# datapoble · Capa semántica — CONTRATO ÚNICO
# Fuente de verdad de las métricas. La consumen: pipeline (transform), IA (Brúixola) y frontend (Mirador).
# Multilingüe: label/definicio en ca + es (en/fr se añaden vía catálogos i18n del producto).
# Regla: ninguna métrica sin fórmula, fuente y fecha. Ningún número sin procedencia.

meta:
  project: datapoble
  version: "1.0"
  owner: Talaia
  description:
    ca: Definició única i traçable de cada indicador del observatori.
    es: Definición única y trazable de cada indicador del observatorio.
  locales: [ca, es]          # en, fr ampliables
  default_locale: ca
  join_key: ine5             # codi INE de 5 dígits
  scope: "Berguedà (31 municipis) → Catalunya (~947) en investigació"

# ----------------------------------------------------------------------------
sources:
  idescat_emex:
    organisme: Idescat
    producte: El municipi en xifres (EMEX) / Cens 2021
    acces: "https://api.idescat.cat/emex/v1/dades.json?id={codi6}"
    llicencia: "Idescat, reutilització amb atribució"
  rtc:
    organisme: Generalitat — Registre de Turisme de Catalunya
    producte: Establiments d'allotjament turístic
    dataset_id: t2h3-cgys
    acces: "https://analisi.transparenciacatalunya.cat/resource/t2h3-cgys.json"
    llicencia: Dades Obertes de Catalunya
  residus:
    organisme: Agència de Residus de Catalunya (ARC)
    producte: Estadístiques de residus municipals
    dataset_id: 69zu-w48s
    llicencia: Dades Obertes de Catalunya
    nota: "Inclou les fraccions de recollida selectiva (vidre, paper, FORM…). El VIDRE/hab és el senyal de la capa L3 (pressió turística/hostaleria)."
  icaen:
    organisme: ICAEN
    producte: Certificats d'eficiència energètica d'edificis
    dataset_id: j6ii-t3w2
    llicencia: Dades Obertes de Catalunya
  icaen_consum:
    organisme: Institut Català d'Energia (ICAEN)
    producte: Consum d'energia elèctrica per municipis i sectors de Catalunya
    dataset_id: 8idm-becu
    llicencia: Dades Obertes de Catalunya
    nota: "Sector USOS DOMÈSTICS, darrer any de cobertura plena (2024). kWh/hab és el senyal de la capa L1 (població pernocta)."
  electoral:
    organisme: Generalitat
    producte: Processos electorals - Vots
    dataset_id: ntc4-rnwr
    llicencia: Dades Obertes de Catalunya
    nota: "Lectura ECOLÒGICA (no individual). Volàtil en micromunicipis."
  osm_overpass:
    organisme: OpenStreetMap (col·laboradors) — via Overpass API
    producte: Punts d'interès de restauració (amenity=restaurant/cafe/bar/fast_food/pub/biergarten/ice_cream)
    acces: "https://overpass-api.de/api/interpreter (POST Overpass QL; sense auth)"
    llicencia: "ODbL (OpenStreetMap) — atribució + compartir-igual"
    nota: "2n proxy d'hostaleria de la capa L3 (complement del vidre). POIs assignats al municipi per PUNT-EN-POLÍGON amb la geometria real (ine5). OSM INFRA-MAPEJA el rural → el compte és un MÍNIM observat, NO un cens. Idescat (ee, CCAE-56) oficial NO és municipal per API oberta (secret estadístic; l'EMEX només dóna 'serveis' agregat)."
  datapoble:
    organisme: datapoble (calculat)
    producte: Indicadors derivats i índex IETR
    nota: "Inferència pròpia a partir de fonts oficials."

# ----------------------------------------------------------------------------
entities:
  municipi:
    label: {ca: Municipi, es: Municipio}
    key: ine5
    table: mart_municipi

# ----------------------------------------------------------------------------
# Estados: public (es visible) · planned (definido, aún no calculado)
# table: mart de destino que produce el pipeline (Sondeig).
metrics:

  # --- Demografia / vivenda ---
  poblacio:
    label: {ca: Població, es: Población}
    definicio:
      ca: Població empadronada.
      es: Población empadronada.
    dimension: demografia
    unit: {ca: habitants, es: habitantes}
    formula: directe
    source: idescat_emex
    date: "2025"
    table: mart_municipi
    column: poblacio
    visibility: public
    synonyms: {ca: [població, habitants, gent], es: [población, habitantes, gente]}

  hab_total:
    label: {ca: Habitatges (total), es: Viviendas (total)}
    definicio:
      ca: Parc total d'habitatges (Cens 2021).
      es: Parque total de viviendas (Censo 2021).
    dimension: vivenda
    unit: {ca: habitatges, es: viviendas}
    formula: directe
    source: idescat_emex
    date: "2021"
    table: mart_municipi
    column: hab_total
    visibility: public

  hab_principal:
    label: {ca: Habitatges principals, es: Viviendas principales}
    definicio:
      ca: Habitatges de residència habitual.
      es: Viviendas de residencia habitual.
    dimension: vivenda
    unit: {ca: habitatges, es: viviendas}
    formula: directe
    source: idescat_emex
    date: "2021"
    table: mart_municipi
    column: hab_principal
    visibility: public

  hab_noprincipal:
    label: {ca: Habitatges no principals, es: Viviendas no principales}
    definicio:
      ca: Secundàries + buides (no residència habitual). Senyal estructural de segona residència.
      es: Secundarias + vacías (no residencia habitual). Señal estructural de segunda residencia.
    dimension: vivenda
    unit: {ca: habitatges, es: viviendas}
    formula: directe
    source: idescat_emex
    date: "2021"
    table: mart_municipi
    column: hab_noprincipal
    visibility: public
    synonyms: {ca: [segona residència, buides], es: [segunda residencia, vacías]}

  pct_noprincipal:
    label: {ca: "% habitatge no principal", es: "% vivienda no principal"}
    definicio:
      ca: Pes de l'habitatge no principal sobre el total.
      es: Peso de la vivienda no principal sobre el total.
    dimension: vivenda
    unit: "%"
    formula: "hab_noprincipal / hab_total * 100"
    source: datapoble
    origin_source: idescat_emex
    date: "2021"
    table: mart_municipi
    column: pct_noprincipal
    visibility: public

  hab_per_hab:
    label: {ca: Habitatges per habitant, es: Viviendas por habitante}
    definicio:
      ca: Sobredimensió del parc respecte a la població resident.
      es: Sobredimensión del parque respecto a la población residente.
    dimension: vivenda
    unit: {ca: ràtio, es: ratio}
    formula: "hab_total / poblacio"
    source: datapoble
    date: "2021/2025"
    table: mart_municipi
    column: hab_per_hab
    visibility: public

  index_envelliment:
    label: {ca: Índex d'envelliment, es: Índice de envejecimiento}
    definicio:
      ca: "Població 65+ per cada 100 de 0-14. Eix demogràfic per a l'anàlisi extrema dreta × edat."
      es: "Población 65+ por cada 100 de 0-14. Eje demográfico para el análisis extrema derecha × edad."
    dimension: demografia
    unit: {ca: "65+/0-14 ×100", es: "65+/0-14 ×100"}
    formula: "poblacio_65_mes / poblacio_0_14 * 100"
    source: idescat_emex
    date: "2025"
    table: mart_municipi
    column: index_envelliment
    visibility: public
    status: planned

  # --- Turisme ---
  rtc_total:
    label: {ca: Establiments turístics, es: Establecimientos turísticos}
    definicio:
      ca: Allotjaments turístics reglats (HUT, hotel, rural, càmping).
      es: Alojamientos turísticos reglados (HUT, hotel, rural, camping).
    dimension: turisme
    unit: {ca: establiments, es: establecimientos}
    formula: directe
    source: rtc
    date: "2026"
    table: mart_municipi
    column: rtc_total
    visibility: public

  rtc_hut:
    label: {ca: "HUT (habitatges d'ús turístic)", es: "HUT (viviendas de uso turístico)"}
    definicio:
      ca: Subconjunt d'habitatges d'ús turístic.
      es: Subconjunto de viviendas de uso turístico.
    dimension: turisme
    unit: {ca: establiments, es: establecimientos}
    formula: directe
    source: rtc
    date: "2026"
    table: mart_municipi
    column: rtc_hut
    visibility: public

  rtc_per_1000hab:
    label: {ca: Establiments / 1000 hab, es: Establecimientos / 1000 hab}
    definicio:
      ca: Intensitat turística reglada per càpita.
      es: Intensidad turística reglada per cápita.
    dimension: turisme
    unit: {ca: per mil, es: por mil}
    formula: "rtc_total / poblacio * 1000"
    source: datapoble
    table: mart_municipi
    column: rtc_per_1000hab
    visibility: public
    synonyms: {ca: [intensitat turística], es: [intensidad turística]}

  rtc_per_100hab_viv:
    label: {ca: Establiments / 100 habitatges, es: Establecimientos / 100 viviendas}
    definicio:
      ca: Penetració del turisme reglat en el parc.
      es: Penetración del turismo reglado en el parque.
    dimension: turisme
    unit: {ca: per cent, es: por cien}
    formula: "rtc_total / hab_total * 100"
    source: datapoble
    table: mart_municipi
    column: rtc_per_100hab_viv
    visibility: public

  # --- Pressió / càrrega real ---
  kg_hab_any:
    label: {ca: Residus kg/hab/any, es: Residuos kg/hab/año}
    definicio:
      ca: Generació de residus per habitant empadronat. Proxy de càrrega real (població fantasma).
      es: Generación de residuos por habitante empadronado. Proxy de carga real (población fantasma).
    dimension: pressio
    unit: {ca: kg/hab/any, es: kg/hab/año}
    formula: directe
    source: residus
    date: "2024"
    table: mart_municipi
    column: kg_hab_any
    visibility: public
    synonyms: {ca: [residus, brossa, població fantasma], es: [residuos, basura, población fantasma]}

  # ==========================================================================
  # INDICADOR ESTRELLA — MODEL DE 3 CAPES (DERIVED, inferència). Mètode de Talaia,
  # validat sobre dades. 3 senyals físics INDEPENDENTS per municipi, cadascun amb
  # la seva base residencial (viles de vall poc turístiques, IETR<5, pop-pond):
  #   L1 població pernocta  ← elèctric domèstic / base_electric (1224)  → qui DORM
  #   L2 càrrega humana total ← residus / base_residencial (410)        → inclou dia
  #   L3 pressió turística  ← vidre/hab (z-score comarcal 0-100)        → hostaleria
  # Tot és INFERÈNCIA (no cens): es comunica com a RANG + caveat. Lectura ECOLÒGICA.
  # ==========================================================================

  # --- Senyals físics per càpita (inputs de les capes) ---
  kwh_hab:
    label: {ca: Elèctric domèstic kWh/hab, es: Eléctrico doméstico kWh/hab}
    definicio:
      ca: "Consum elèctric domèstic per habitant empadronat, darrer any de cobertura plena (2024). Senyal de presència que pernocta (capa L1)."
      es: "Consumo eléctrico doméstico por habitante empadronado, último año de cobertura plena (2024). Señal de presencia que pernocta (capa L1)."
    dimension: pressio
    unit: {ca: kWh/hab/any, es: kWh/hab/año}
    formula: "consum_domestic_kwh / poblacio"
    source: icaen_consum
    date: "2024"
    table: mart_municipi
    column: kwh_hab
    visibility: public
    synonyms: {ca: [electricitat, consum elèctric, llum], es: [electricidad, consumo eléctrico, luz]}

  vidre_hab:
    label: {ca: Vidre kg/hab/any, es: Vidrio kg/hab/año}
    definicio:
      ca: "Generació de vidre per habitant empadronat (fracció de recollida selectiva). Proxy d'hostaleria (ampolles de bar/restaurant); senyal de la capa L3."
      es: "Generación de vidrio por habitante empadronado (fracción de recogida selectiva). Proxy de hostelería (botellas de bar/restaurante); señal de la capa L3."
    dimension: pressio
    unit: {ca: kg/hab/any, es: kg/hab/año}
    formula: "vidre_tones * 1000 / poblacio"
    source: residus
    date: "2024"
    table: mart_municipi
    column: vidre_hab
    visibility: public
    synonyms: {ca: [vidre, ampolles, hostaleria], es: [vidrio, botellas, hostelería]}

  # --- 2n PROXY D'HOSTALERIA de la capa L3 (restauració, OSM) — complement del vidre ---
  # El vidre mesura ACTIVITAT (ampolles consumides); la restauració, CAPACITAT instal·lada
  # (stock de locals). Dos senyals INDEPENDENTS que apunten al mateix fenomen. És una
  # MESURA (no inferència), però OSM infra-mapeja el rural → MÍNIM observat, no cens.
  restauracio_estab:
    label: {ca: Establiments de restauració, es: Establecimientos de restauración}
    definicio:
      ca: "Nombre de locals de restauració (restaurants, bars, cafeteries, menjars ràpids, pubs; CCAE-56) mapejats a OpenStreetMap dins el municipi. 2n proxy d'hostaleria (capacitat), complement del vidre."
      es: "Número de locales de restauración (restaurantes, bares, cafeterías, comidas rápidas, pubs; CCAE-56) mapeados en OpenStreetMap dentro del municipio. 2º proxy de hostelería (capacidad), complemento del vidrio."
    dimension: turisme
    unit: {ca: establiments, es: establecimientos}
    formula: "compte de POIs amenity in (restaurant,cafe,bar,fast_food,pub,biergarten,ice_cream) assignats per punt-en-polígon a la geometria municipal real"
    source: osm_overpass
    date: "2026"
    table: mart_municipi
    column: restauracio_estab
    visibility: public
    note:
      ca: "MÍNIM observat, NO un cens: OSM INFRA-MAPEJA les zones rurals (la completesa del mapejat varia entre municipis), per això 6 micromunicipis surten amb 0 tot i tenir senyal de vidre. És una MESURA (no inferència); la lectura de «pressió turística» que se'n fa SÍ és inferència. El contrast oficial Idescat (ee, CCAE-56) no és municipal per API oberta (secret estadístic). Llicència ODbL (atribució + compartir-igual)."
      es: "MÍNIMO observado, NO un censo: OSM INFRAMAPEA las zonas rurales (la completitud del mapeo varía entre municipios), por eso 6 micromunicipios salen con 0 pese a tener señal de vidrio. Es una MEDIDA (no inferencia); la lectura de «presión turística» que se hace SÍ es inferencia. El contraste oficial Idescat (ee, CCAE-56) no es municipal por API abierta (secreto estadístico). Licencia ODbL (atribución + compartir-igual)."
    synonyms: {ca: [restauració, bars, restaurants, hostaleria, locals], es: [restauración, bares, restaurantes, hostelería, locales]}

  restauracio_per_1000hab:
    label: {ca: Restauració / 1000 hab, es: Restauración / 1000 hab}
    definicio:
      ca: "Densitat d'establiments de restauració per cada 1000 habitants empadronats. Intensitat d'hostaleria per càpita (stock), 2n senyal de la capa L3."
      es: "Densidad de establecimientos de restauración por cada 1000 habitantes empadronados. Intensidad de hostelería per cápita (stock), 2ª señal de la capa L3."
    dimension: turisme
    unit: {ca: per mil, es: por mil}
    formula: "restauracio_estab / poblacio * 1000"
    source: datapoble
    origin_source: osm_overpass
    date: "2026"
    table: mart_municipi
    column: restauracio_per_1000hab
    visibility: public
    note:
      ca: "Densitat per càpita: aïlla l'orientació a visitants de la mida del municipi (Berga té el màxim absolut d'establiments però queda baixa per càpita; els pobles de muntanya turístics queden alts). Hereta el caveat de completesa d'OSM (MÍNIM, no cens): als micromunicipis no mapejats subestima. Validat com a 2n proxy independent del vidre (Spearman ≈ 0,54 amb vidre_hab i amb index_turisme, N=31, p<0,01)."
      es: "Densidad per cápita: aísla la orientación a visitantes del tamaño del municipio (Berga tiene el máximo absoluto de establecimientos pero queda baja per cápita; los pueblos de montaña turísticos quedan altos). Hereda el caveat de completitud de OSM (MÍNIMO, no censo): en los micromunicipios no mapeados subestima. Validado como 2º proxy independiente del vidrio (Spearman ≈ 0,54 con vidre_hab y con index_turisme, N=31, p<0,01)."
    synonyms: {ca: [densitat restauració, restaurants per habitant, hostaleria per càpita], es: [densidad restauración, restaurantes por habitante, hostelería per cápita]}

  # --- L1 · POBLACIÓ REAL ESTIMADA (PERNOCTA) — la nova «població invisible» ---
  poblacio_pernocta_est:
    label: {ca: "Població real estimada (pernocta)", es: "Población real estimada (pernocta)"}
    label_ca: "Població real estimada (pernocta)"
    label_es: "Población real estimada (pernocta)"
    definicio:
      ca: "La població que DORM al territori sense constar al padró (residents no registrats, segona residència, estacionals que hi pernocten), estimada a partir del consum elèctric domèstic per habitant."
      es: "La población que DUERME en el territorio sin constar en el padrón (residentes no registrados, segunda residencia, estacionales que pernoctan), estimada a partir del consumo eléctrico doméstico por habitante."
    dimension: pressio
    categoria: derived
    unit: {ca: habitants (est.), es: habitantes (est.)}
    formula: "round(poblacio * kwh_hab / BASE_ELECTRIC)  · BASE_ELECTRIC=1224 kWh/hab (viles IETR<5, parametritzable per comarca)"
    source: datapoble
    origin_source: icaen_consum
    font: "ICAEN (consum elèctric domèstic, 8idm-becu) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: poblacio_pernocta_est
    visibility: public
    caveat:
      ca: "INFERÈNCIA, no cens. L'elèctric és un proxy de PERNOCTA, però el confonen la calefacció (a muntanya es crema llenya/gas → consum baix malgrat presència, p. ex. Castellar de n'Hug), la mida de la llar i l'eficiència → la xifra es llegeix com a RANG + confiança. NO inclou els excursionistes de dia (per a la pressió total, càrrega humana total). Lectura ECOLÒGICA (sobre el municipi, mai sobre individus)."
      es: "INFERENCIA, no censo. El eléctrico es un proxy de PERNOCTA, pero lo confunden la calefacción (en montaña se quema leña/gas → consumo bajo pese a presencia, p. ej. Castellar de n'Hug), el tamaño del hogar y la eficiencia → la cifra se lee como RANGO + confianza. NO incluye los excursionistas de día (para la presión total, carga humana total). Lectura ECOLÓGICA (sobre el municipio, nunca sobre individuos)."
    synonyms: {ca: [població real, presència real, població invisible, gent real, qui pernocta], es: [población real, presencia real, población invisible, gente real, quién pernocta]}

  gap_pernocta:
    label: {ca: "Gap pernocta (absolut)", es: "Gap pernocta (absoluto)"}
    label_ca: "Gap pernocta (absolut)"
    label_es: "Gap pernocta (absoluto)"
    definicio:
      ca: "Població invisible: població real estimada (pernocta) − padró. La 'gent dels rius de gent' que dorm al territori sense constar."
      es: "Población invisible: población real estimada (pernocta) − padrón. La 'gente de los ríos de gente' que duerme en el territorio sin constar."
    dimension: pressio
    categoria: derived
    unit: {ca: habitants, es: habitantes}
    formula: "poblacio_pernocta_est - poblacio"
    source: datapoble
    origin_source: icaen_consum
    font: "ICAEN (consum elèctric domèstic) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: gap_pernocta
    visibility: public
    caveat:
      ca: "Derivat de poblacio_pernocta_est: hereta la seva incertesa (rang). Pot ser negatiu (calefacció no elèctrica, eficiència). Es concentra a les muntanyes turístiques, no a les viles. Lectura ecològica."
      es: "Derivado de poblacio_pernocta_est: hereda su incertidumbre (rango). Puede ser negativo (calefacción no eléctrica, eficiencia). Se concentra en las montañas turísticas, no en las villas. Lectura ecológica."
    synonyms: {ca: [gap pernocta, població invisible, diferència padró], es: [gap pernocta, población invisible, diferencia padrón]}

  gap_pernocta_pct:
    label: {ca: "Gap pernocta (%)", es: "Gap pernocta (%)"}
    label_ca: "Gap pernocta (%)"
    label_es: "Gap pernocta (%)"
    definicio:
      ca: "Gap de pernocta relatiu sobre el padró: quant per cent més de gent dorm al territori de la registrada."
      es: "Gap de pernocta relativo sobre el padrón: cuánto por ciento más de gente duerme en el territorio de la registrada."
    dimension: pressio
    categoria: derived
    unit: "%"
    formula: "gap_pernocta / poblacio * 100"
    source: datapoble
    origin_source: icaen_consum
    font: "ICAEN (consum elèctric domèstic) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: gap_pernocta_pct
    visibility: public
    caveat:
      ca: "Percentatge sobre el padró (+12 = +12% més gent que dorm al territori). Volàtil als micromunicipis (denominador petit) i sensible a la calefacció → mirar sempre la bandera confianca. Inferència, lectura ecològica."
      es: "Porcentaje sobre el padrón (+12 = +12% más gente que duerme en el territorio). Volátil en micromunicipios (denominador pequeño) y sensible a la calefacción → mirar siempre la bandera confianza. Inferencia, lectura ecológica."
    synonyms: {ca: [gap pernocta %, població invisible %], es: [gap pernocta %, población invisible %]}

  # --- L2 · CÀRREGA HUMANA TOTAL (residus) — inclou visitants de dia ---
  carrega_total_est:
    label: {ca: "Càrrega humana total", es: "Carga humana total"}
    label_ca: "Càrrega humana total"
    label_es: "Carga humana total"
    definicio:
      ca: "Pressió humana total sobre el municipi inclosos els visitants de DIA (excursionistes), estimada a partir de la generació de residus per habitant. NO és població: és càrrega."
      es: "Presión humana total sobre el municipio incluidos los visitantes de DÍA (excursionistas), estimada a partir de la generación de residuos por habitante. NO es población: es carga."
    dimension: pressio
    categoria: derived
    unit: {ca: persones-equivalent (est.), es: personas-equivalente (est.)}
    formula: "round(poblacio * kg_hab_any / BASE)  · BASE=410 (base residencial, parametritzable per comarca)"
    source: datapoble
    origin_source: residus
    font: "ARC (residus, kg/hab/any) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: carrega_total_est
    visibility: public
    caveat:
      ca: "INFERÈNCIA, no cens, i NO és «població»: és càrrega total (residents + 2a residència + estacionals + EXCURSIONISTES de dia). Els residus de les viles porten part de COMERÇ (sostre de la base, terra de la càrrega). Sempre ≥ la població pernocta, perquè inclou el dia. Lectura ECOLÒGICA. Vegeu confianca."
      es: "INFERENCIA, no censo, y NO es «población»: es carga total (residentes + 2ª residencia + estacionales + EXCURSIONISTAS de día). Los residuos de las villas llevan parte de COMERCIO (techo de la base, suelo de la carga). Siempre ≥ la población pernocta, porque incluye el día. Lectura ECOLÓGICA. Véase confianza."
    synonyms: {ca: [càrrega humana, pressió total, càrrega real, excursionistes], es: [carga humana, presión total, carga real, excursionistas]}

  # --- L3 · PRESSIÓ TURÍSTICA (hostaleria, via vidre) — NO és població ---
  index_turisme:
    label: {ca: "Pressió turística (hostaleria)", es: "Presión turística (hostelería)"}
    label_ca: "Pressió turística (hostaleria)"
    label_es: "Presión turística (hostelería)"
    definicio:
      ca: "Intensitat d'activitat de visitants (hostaleria), via vidre per habitant: z-score comarcal del vidre/hab portat a 0–100 (50 = mitjana comarcal). Proxy d'hostaleria, NO població."
      es: "Intensidad de actividad de visitantes (hostelería), vía vidrio por habitante: z-score comarcal del vidrio/hab llevado a 0–100 (50 = media comarcal). Proxy de hostelería, NO población."
    dimension: index
    categoria: derived
    unit: "0-100"
    formula: "z-score comarcal de vidre_hab (clamp [-2,2]) reescalat a 0-100  · alternativa de referència: vidre_hab / BASE_VIDRE (26.5)"
    source: datapoble
    origin_source: residus
    font: "ARC (fracció vidre, 69zu-w48s)"
    date: "2024"
    table: mart_municipi
    column: index_turisme
    visibility: public
    caveat:
      ca: "NO és població ni càrrega de persones: és INTENSITAT d'hostaleria (el vidre el genera el bar/restaurant que serveix el visitant). És RELATIU a la comarca (z-score): 50 = un municipi mitjà del Berguedà, no un valor absolut. Granularitat anual (no capta estacionalitat). Inferència, lectura ecològica."
      es: "NO es población ni carga de personas: es INTENSIDAD de hostelería (el vidrio lo genera el bar/restaurante que sirve al visitante). Es RELATIVO a la comarca (z-score): 50 = un municipio medio del Berguedà, no un valor absoluto. Granularidad anual (no capta estacionalidad). Inferencia, lectura ecológica."
    synonyms: {ca: [turisme, hostaleria, pressió turística, vidre], es: [turismo, hostelería, presión turística, vidrio]}

  # --- COMPATIBILITAT (model anterior d'una capa) — claus conservades, reenquadrades ---
  poblacio_real_est:
    label: {ca: "Càrrega humana total (alies)", es: "Carga humana total (alias)"}
    label_ca: "Càrrega humana total (alies)"
    label_es: "Carga humana total (alias)"
    definicio:
      ca: "ÀLIES de carrega_total_est (mateixa fórmula residus/410). REENQUADRAT: NO és «població real» sinó CÀRREGA humana total (inclou excursionistes). Es conserva per no trencar consumidors; per la població real que pernocta, useu poblacio_pernocta_est."
      es: "ALIAS de carrega_total_est (misma fórmula residuos/410). REENCUADRADO: NO es «población real» sino CARGA humana total (incluye excursionistas). Se conserva para no romper consumidores; para la población real que pernocta, usad poblacio_pernocta_est."
    dimension: pressio
    categoria: derived
    unit: {ca: persones-equivalent (est.), es: personas-equivalente (est.)}
    formula: "round(poblacio * kg_hab_any / BASE)  · BASE=410  (== carrega_total_est)"
    source: datapoble
    origin_source: residus
    font: "ARC (residus, kg/hab/any) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: poblacio_real_est
    visibility: public
    caveat:
      ca: "DEPRECAT com a «població»: és l'antic indicador d'una capa, ara reenquadrat com a càrrega humana total (== carrega_total_est). Migrar a poblacio_pernocta_est (L1, població que dorm) o carrega_total_est (L2, pressió total). Inferència, lectura ecològica."
      es: "DEPRECADO como «población»: es el antiguo indicador de una capa, ahora reencuadrado como carga humana total (== carrega_total_est). Migrar a poblacio_pernocta_est (L1, población que duerme) o carrega_total_est (L2, presión total). Inferencia, lectura ecológica."
    synonyms: {ca: [població real, càrrega humana], es: [población real, carga humana]}

  gap_abs:
    label: {ca: "Gap càrrega (absolut)", es: "Gap carga (absoluto)"}
    label_ca: "Gap càrrega (absolut)"
    label_es: "Gap carga (absoluto)"
    definicio:
      ca: "carrega_total_est − padró (gap de CÀRREGA, inclou visitants de dia). Es conserva per compatibilitat; per la població invisible que pernocta, useu gap_pernocta."
      es: "carrega_total_est − padrón (gap de CARGA, incluye visitantes de día). Se conserva por compatibilidad; para la población invisible que pernocta, usad gap_pernocta."
    dimension: pressio
    categoria: derived
    unit: {ca: habitants, es: habitantes}
    formula: "poblacio_real_est - poblacio  (gap de càrrega total)"
    source: datapoble
    origin_source: residus
    font: "ARC (residus) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: gap_abs
    visibility: public
    caveat:
      ca: "Gap de CÀRREGA (no de pernocta): inclou els excursionistes de dia. Pot ser negatiu. Es concentra a les muntanyes turístiques. Per al gap de població que dorm, gap_pernocta. Lectura ecològica."
      es: "Gap de CARGA (no de pernocta): incluye los excursionistas de día. Puede ser negativo. Se concentra en las montañas turísticas. Para el gap de población que duerme, gap_pernocta. Lectura ecológica."
    synonyms: {ca: [gap, gap càrrega, diferència padró], es: [gap, gap carga, diferencia padrón]}

  gap_pct:
    label: {ca: "Gap càrrega (%)", es: "Gap carga (%)"}
    label_ca: "Gap càrrega (%)"
    label_es: "Gap carga (%)"
    definicio:
      ca: "Gap de càrrega relatiu sobre el padró: quant per cent més de càrrega humana (inclòs el dia) hi ha de la registrada. Per al gap de pernocta, gap_pernocta_pct."
      es: "Gap de carga relativo sobre el padrón: cuánto por ciento más de carga humana (incluido el día) hay de la registrada. Para el gap de pernocta, gap_pernocta_pct."
    dimension: pressio
    categoria: derived
    unit: "%"
    formula: "gap_abs / poblacio * 100  (gap de càrrega total)"
    source: datapoble
    origin_source: residus
    font: "ARC (residus) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: gap_pct
    visibility: public
    caveat:
      ca: "Percentatge sobre el padró (+12 = +12%). Gap de CÀRREGA (inclou dia), no de pernocta. Volàtil als micromunicipis → mirar la bandera confianca. Inferència, lectura ecològica."
      es: "Porcentaje sobre el padrón (+12 = +12%). Gap de CARGA (incluye día), no de pernocta. Volátil en micromunicipios → mirar la bandera confianza. Inferencia, lectura ecológica."

  poblacio_real_rel:
    label: {ca: Població real (tall relatiu), es: Población real (corte relativo)}
    label_ca: Població real (tall relatiu)
    label_es: Población real (corte relativo)
    definicio:
      ca: "Presència estimada amb base comarcal (mitjana pop-ponderada). Vista espacial: qui acull més DINS la comarca (≈ suma zero, redistribució)."
      es: "Presencia estimada con base comarcal (media pop-ponderada). Vista espacial: quién acoge más DENTRO de la comarca (≈ suma cero, redistribución)."
    dimension: pressio
    categoria: derived
    unit: {ca: habitants (est.), es: habitantes (est.)}
    formula: "round(poblacio * kg_hab_any / BASE_COMARCAL)  · BASE_COMARCAL=452 (mitjana comarcal)"
    source: datapoble
    origin_source: residus
    font: "ARC (residus) + Idescat (padró)"
    date: "2024/2025"
    table: mart_municipi
    column: poblacio_real_rel
    visibility: public
    caveat:
      ca: "Tall RELATIU: conserva el total comarcal (suma zero) → mostra distribució espacial, NO sub-recompte global (per a això, poblacio_real_est). Inferència, lectura ecològica."
      es: "Corte RELATIVO: conserva el total comarcal (suma cero) → muestra distribución espacial, NO sub-recuento global (para eso, poblacio_real_est). Inferencia, lectura ecológica."

  confianca:
    label: {ca: Confiança de l'estimació, es: Confianza de la estimación}
    label_ca: Confiança de l'estimació
    label_es: Confianza de la estimación
    definicio:
      ca: "Bandera de fiabilitat de les estimacions de les 3 capes: alta/mitjana/baixa segons la corroboració entre els senyals físics (residus, elèctric domèstic/hab, % habitatge no principal) i la mida del municipi. Quan els 3 senyals coincideixen la confiança és alta; quan divergeixen, baixa."
      es: "Bandera de fiabilidad de las estimaciones de las 3 capas: alta/mitjana/baixa según la corroboración entre las señales físicas (residuos, eléctrico doméstico/hab, % vivienda no principal) y el tamaño del municipio. Cuando las 3 señales coinciden la confianza es alta; cuando divergen, baja."
    dimension: pressio
    categoria: derived
    unit: {ca: "alta/mitjana/baixa", es: "alta/mitjana/baixa"}
    formula: "baixa si poblacio<75 O senyals divergents; alta si residus>mediana I (kwh_hab O %no-principal)>mediana I poblacio>=75; mitjana la resta"
    source: datapoble
    origin_source: residus
    font: "ARC (residus) + ICAEN (consum domèstic) + Idescat (habitatge/padró)"
    date: "2024/2025"
    table: mart_municipi
    column: confianca
    visibility: public
    caveat:
      ca: "Un buit honest val més que un fals precís: 'baixa' marca micromunicipis (secret estadístic, soroll de denominador) i casos on els senyals divergeixen (p. ex. residus alts però elèctric baix per calefacció de llenya a muntanya, com Castellar de n'Hug). L'elèctric NO es pondera igual que els residus (és corroborador, no senyal primari)."
      es: "Un vacío honesto vale más que un falso preciso: 'baixa' marca micromunicipios (secreto estadístico, ruido de denominador) y casos donde las señales divergen (p. ej. residuos altos pero eléctrico bajo por calefacción de leña en montaña, como Castellar de n'Hug). El eléctrico NO se pondera igual que los residuos (es corroborador, no señal primaria)."
    synonyms: {ca: [confiança, fiabilitat, banderola], es: [confianza, fiabilidad, banderola]}

  # --- Energia / rehabilitació ---
  pct_icaen_EFG:
    label: {ca: "% certificats E-G", es: "% certificados E-G"}
    definicio:
      ca: Pes de qualificacions baixes (E,F,G). Proxy de potencial de rehabilitació.
      es: Peso de calificaciones bajas (E,F,G). Proxy de potencial de rehabilitación.
    dimension: energia
    unit: "%"
    formula: "icaen_EFG / icaen_total * 100"
    source: datapoble
    origin_source: icaen
    table: mart_municipi
    column: pct_icaen_EFG
    visibility: public

  # --- Índex IETR ---
  IETR:
    label: {ca: Índex d'Exposició Turística-Residencial, es: Índice de Exposición Turística-Residencial}
    definicio:
      ca: "Exposició estructural a la pressió turística-residencial, relativa a la distribució (0=mín, 100=màx). Validat externament amb residus (r=0,87)."
      es: "Exposición estructural a la presión turística-residencial, relativa a la distribución (0=mín, 100=máx). Validado externamente con residuos (r=0,87)."
    dimension: index
    unit: "0-100"
    formula: "0.5*A_resid + 0.5*B_turis (min-max winsoritzat, pesos iguals)"
    source: datapoble
    table: mart_municipi
    column: IETR
    visibility: public
    nota:
      ca: "És exposició estructural (stock), no pressió realitzada. Robust a normalització (Spearman>0,97) i a pesos."
      es: "Es exposición estructural (stock), no presión realizada. Robusto a normalización (Spearman>0,97) y a pesos."
    synonyms: {ca: [índex, exposició, ietr], es: [índice, exposición, ietr]}

  IETR_rank:
    label: {ca: Rànquing IETR, es: Ranking IETR}
    definicio:
      ca: Posició del municipi dins la distribució (1 = major exposició).
      es: Posición del municipio dentro de la distribución (1 = mayor exposición).
    dimension: index
    unit: {ca: posició, es: posición}
    formula: "rank(IETR desc)"
    source: datapoble
    table: mart_municipi
    column: IETR_rank
    visibility: public

  # --- Política (visible, lectura ecològica) ---
  pct_indep:
    label: {ca: "% vot independentista", es: "% voto independentista"}
    definicio:
      ca: "Quota del bloc independentista (ERC, Junts, CUP, Aliança.cat, Alhora…) sobre vot vàlid."
      es: "Cuota del bloque independentista (ERC, Junts, CUP, Aliança.cat, Alhora…) sobre voto válido."
    dimension: politica
    unit: "%"
    formula: "vots_independentistes / vots_valids * 100"
    source: electoral
    date: "2024"
    table: mart_electoral
    column: pct_indep_A20241
    visibility: public
    nota:
      ca: "Lectura ECOLÒGICA (no individual; falàcia ecològica). Volàtil en micromunicipis (N petit)."
      es: "Lectura ECOLÓGICA (no individual; falacia ecológica). Volátil en micromunicipios (N pequeño)."

  pct_esquerra:
    label: {ca: "% vot esquerra", es: "% voto izquierda"}
    definicio:
      ca: "Quota del bloc d'esquerra (PSC, ERC, CUP, Comuns…) sobre vot vàlid."
      es: "Cuota del bloque de izquierda (PSC, ERC, CUP, Comuns…) sobre voto válido."
    dimension: politica
    unit: "%"
    formula: "vots_esquerra / vots_valids * 100"
    source: electoral
    date: "2024"
    table: mart_electoral
    column: pct_esq_A20241
    visibility: public

  pct_extrema_dreta:
    label: {ca: "% vot extrema dreta", es: "% voto extrema derecha"}
    definicio:
      ca: "Quota de l'extrema dreta (Vox + Aliança Catalana + PxC històric) sobre vot vàlid. Sèrie temporal per captar la irrupció."
      es: "Cuota de la extrema derecha (Vox + Aliança Catalana + PxC histórico) sobre voto válido. Serie temporal para captar la irrupción."
    dimension: politica
    unit: "%"
    formula: "vots_extrema_dreta / vots_valids * 100"
    source: electoral
    date: "2017-2024"
    table: mart_electoral
    column: pct_extrema_dreta
    visibility: public
    status: planned
    nota:
      ca: "Lectura ecològica. Aliança Catalana és el focus (extrema dreta independentista, emergent i rural)."
      es: "Lectura ecológica. Aliança Catalana es el foco (extrema derecha independentista, emergente y rural)."

  guanya:
    label: {ca: Candidatura guanyadora, es: Candidatura ganadora}
    definicio:
      ca: Candidatura més votada al municipi.
      es: Candidatura más votada en el municipio.
    dimension: politica
    unit: {ca: sigla, es: sigla}
    formula: "argmax(vots)"
    source: electoral
    date: "2024"
    table: mart_electoral
    column: guanya_A20241
    visibility: public

# ----------------------------------------------------------------------------
# Preguntas tipo (semilla para evals de la IA)
sample_questions:
  ca:
    - Quin municipi té més exposició turística-residencial?
    - Quants habitatges no principals té Castellar de n'Hug?
    - Quina relació hi ha entre l'índex i els residus?
    - On creix més l'extrema dreta?
  es:
    - ¿Qué municipio tiene mayor exposición turística-residencial?
    - ¿Cuántas viviendas no principales tiene Castellar de n'Hug?
    - ¿Qué relación hay entre el índice y los residuos?
    - ¿Dónde crece más la extrema derecha?
