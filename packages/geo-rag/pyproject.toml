[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datapoble-geo-rag"
version = "0.1.0"
description = "Geospatial-RAG substrate (DuckDB) for the 31 Berguedà municipalities — isolated Phase 0a experiment."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Talaia", email = "talaia@datapoble.local" }]
dependencies = [
    "duckdb>=1.0",
]

[project.optional-dependencies]
# Local dev / CI.
dev = [
    "pytest>=8.0",
]

[project.scripts]
datapoble-geo-rag = "datapoble_geo_rag.build:main"

[tool.hatch.build.targets.wheel]
packages = ["src/datapoble_geo_rag"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"

[tool.ruff]
src = ["src"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",
]
