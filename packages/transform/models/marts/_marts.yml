version: 2

models:
  - name: mart_municipi
    description: >
      1 fila per municipi de Catalunya (clau ine5; escala F2, 947 munis). Columnes segons
      el contracte semantic/metrics.yml (table: mart_municipi). IETR/IETR_rank es calculen
      amb la metodologia de Talaia (min-max winsoritzat p5/p95 GLOBAL sobre tot CAT, dues
      dimensions a pesos iguals). pct_icaen_EFG segueix NULL (requereix connector ICAEN).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join del contracte).
        data_tests:
          - unique
          - not_null
      - name: codi6
        description: Codi Idescat de 6 dígits (INE5 + dígit de control).
        data_tests:
          - not_null
      - name: municipi
        description: Nom oficial del municipi.
        data_tests:
          - not_null
      - name: poblacio
        description: Població empadronada (Idescat EMEX 2025).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: hab_total
        description: Habitatges familiars totals (Cens 2021).
        data_tests:
          - not_null
      - name: hab_principal
        description: Habitatges familiars principals (Cens 2021).
      - name: hab_noprincipal
        description: Habitatges familiars no principals (Cens 2021).
      - name: pct_noprincipal
        description: "% habitatge no principal sobre el total. 0-100."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: hab_per_hab
        description: Habitatges per habitant (ràtio).
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      # --- Franges d'edat (E12 de les esmenes de Bea) ---
      # Vintage 2025 (Cens de població anual de l'INE via EMEX), el mateix que `poblacio`.
      # La partició exacta i la regla de publicació de pob_15_64 les guarda el test singular
      # `assert_mart_municipi_franges_edat.sql`.
      - name: pob_0_14
        description: Població de 0 a 14 anys (EMEX f167, 2025).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pob_15_64
        description: >
          Població de 15 a 64 anys. DERIVADA per resta (poblacio − 0-14 − 65-84 − 85+):
          EMEX no la serveix. NULL si la resta no quadra (component absent o resultat
          negatiu) — mai un número fabricat. Avui quadra als 947.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pob_65_84
        description: Població de 65 a 84 anys (EMEX f28, 2025).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pob_85_mes
        description: Població de 85 anys i més (EMEX f29, 2025).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pob_65_mes
        description: >
          Població de 65 anys i més (rollup 65-84 + 85+). És el numerador
          d'index_envelliment; s'exposa perquè la xifra que el tauler ensenya sigui
          la mateixa que la fórmula fa servir.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: index_envelliment
        description: Població 65+ per cada 100 de 0-14.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_total
        description: Establiments turístics reglats d'alta (RTC).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_hut
        description: Subconjunt d'habitatges d'ús turístic (HUT).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_per_1000hab
        description: Establiments per 1000 habitants.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: rtc_per_100hab_viv
        description: Establiments per 100 habitatges.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: kg_hab_any
        description: Residus kg/hab/any (ARC, darrer any = 2024).
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      # --- Senyals físics per càpita (inputs de les 3 capes) ---
      - name: kwh_hab
        description: >
          Consum elèctric domèstic kWh/hab del darrer any ple (2024, sector USOS
          DOMÈSTICS). Senyal de la capa L1 (pernocta).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: vidre_hab
        description: >
          Vidre kg/hab/any del darrer any (fracció ARC 69zu-w48s). Senyal de la
          capa L3 (pressió turística/hostaleria). Cobertura 31/31.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      # --- 2n proxy d'hostaleria de la capa L3 (restauració, OSM) ---
      - name: restauracio_estab
        description: >
          Nombre de locals de restauració (CCAE-56) mapejats a OSM, assignats al
          municipi per punt-en-polígon (geometria real). 2n proxy d'hostaleria
          (capacitat), complement del vidre. MÍNIM observat, no cens: OSM
          infra-mapeja el rural. 2a onada: NULL fora del Berguedà (sense OSM a escala);
          dins el Berguedà, 0 = absència real.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      - name: restauracio_per_1000hab
        description: >
          Densitat d'establiments de restauració per 1000 hab (restauracio_estab /
          poblacio * 1000). Validat com a 2n proxy independent del vidre
          (Spearman ≈ 0,54 amb vidre_hab i index_turisme, N=31). Hereta el caveat
          de completesa d'OSM. 2a onada: NULL fora del Berguedà.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100000 }
      # --- INDICADOR ESTRELLA: MODEL DE 3 CAPES (INFERÈNCIA, no cens) ---
      # L1 · població pernocta (elèctric/base_electric) — la nova «població invisible».
      - name: poblacio_pernocta_est
        description: >
          L1. Població que DORM al territori sense constar al padró:
          round(poblacio * kwh_hab / base_pred), base_pred = base per covariables
          (Nivell C, per muni). Inferència; rang + caveat (semantic/metrics.yml).
          NULL on no hi ha base_pred (sense covariables, ~20 munis): honest, no inventem.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: gap_pernocta
        description: "L1. poblacio_pernocta_est − poblacio. Pot ser negatiu. NULL sense base_pred."
      - name: gap_pernocta_pct
        description: "L1. gap_pernocta / poblacio * 100 (percentatge 0-100; +12 = +12%). NULL sense base_pred."
      # L2 · càrrega humana total (residus/base_residencial) — inclou visitants de dia.
      - name: carrega_total_est
        description: >
          L2. Càrrega humana total (residents + visitants de DIA):
          round(poblacio * kg_hab_any / base_residencial), base=410. NO és població
          (els residus de les viles porten part de comerç). Era poblacio_real_est.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      # L3 · pressió turística (vidre, z-score GLOBAL CAT 0-100) — NO és població.
      - name: index_turisme
        description: >
          L3. Pressió turística/hostaleria: z-score GLOBAL (tot Catalunya, des de F2) de
          vidre_hab, clamp [-2,+2], portat a 0–100 (50 = mitjana catalana). Proxy
          d'activitat de visitants, NO població. LÍMIT DECLARAT: el clamp és un topall
          dur — tot z≥+2 col·lapsa a 100 (2024: 47 de 947 munis al sostre, abraçant
          76,8–149,4 kg vidre/hab) i l'índex NO ordena al cim; per ordenar, vidre_hab.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      # --- Compatibilitat (model anterior d'una capa) ---
      - name: poblacio_real_est
        description: >
          ÀLIES de carrega_total_est (mateixa fórmula residus/410). REENQUADRAT: és
          càrrega humana total, NO «població». Es conserva per no trencar consumidors.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: gap_abs
        description: >
          carrega_total_est − poblacio (gap de càrrega, no de pernocta). Pot ser
          negatiu. Es conserva per compatibilitat; per la població invisible, gap_pernocta.
        data_tests:
          - not_null
      - name: gap_pct
        description: "gap_abs / poblacio * 100 (percentatge 0-100). Compat; vegeu gap_pernocta_pct per L1."
        data_tests:
          - not_null
      - name: poblacio_real_rel
        description: >
          Presència estimada (tall RELATIU, base comarcal=452): vista espacial
          "qui acull més DINS la comarca" (≈ suma zero). Opcional.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: confianca
        description: >
          Bandera de confiança de l'estimació (alta/mitjana/baixa). baixa als
          micro-munis (poblacio<75, secret estadístic) i on els senyals
          divergeixen; alta quan residus i un corroborador (elèctric/càpita o
          % no principal) superen la mediana comarcal. Honestedat abans que
          precisió falsa.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["alta", "mitjana", "baixa"]
      - name: pct_icaen_EFG
        description: "% certificats E-G (ICAEN). NULL: connector pendent."
      - name: IETR
        description: >
          Índex d'Exposició Turística-Residencial (0-100). Min-max winsoritzat (p5/p95)
          GLOBAL sobre tot Catalunya (des de F2; els ancoratges dels 31 es van retirar,
          vegeu verify_marts.py), eix residencial + eix turístic a pesos iguals.
          LÍMIT DECLARAT: la winsorització censura els extrems — 0 i 100 són terra/sostre
          compartits i l'índex NO ordena allà (2024: 6 munis a 100, 8 a 0).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: IETR_rank
        description: >
          Rànquing IETR (1 = major exposició) sobre round(IETR,2), la precisió publicada.
          rank(): ELS EMPATS COMPARTEIXEN POSICIÓ i el següent salta — NO és únic per
          construcció (el row_number anterior fabricava ordre per codi INE dins l'empat).
        data_tests:
          - not_null
      # --- FASE 1 · 3 derivats nous (endurir el model SENSE fonts noves) ---
      - name: IETR_stock
        description: >
          IETR dual · component ESTRUCTURAL/resident (A_resid reescalat 0-100):
          habitatge no principal + habitatges per habitant. Exposició latent. 0-100.
          Identitat: round(0.5*IETR_stock + 0.5*IETR_impact, 2) == IETR.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: IETR_impact
        description: >
          IETR dual · component de PRESSIÓ realitzada (B_turis reescalat 0-100):
          RTC per 1000 hab + per 100 habitatges. Pressió viva. 0-100.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: tipologia
        description: >
          Classificació amb NOM de com s'habita el municipi (LECTURA, no cens),
          per regles sobre z-scores PER TIPUS TERRITORIAL (iguals amb iguals), a TOT Catalunya:
          dormitori_invisible · excursio · segona_residencia · capital_serveis · buit_administratiu ·
          indeterminat (on és ambigu) · pendent (munis sense covariables/tipus, ~20). Verificat:
          Berga=capital_serveis, Castellar=excursio, Gósol=segona_residencia. OSM infra-mapa el rural →
          els z de serveis/restauració són un mínim observat (el grup per tipus ho atenua).
          Vegeu docs/tipologia-municipal.md.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - dormitori_invisible
                  - excursio
                  - segona_residencia
                  - capital_serveis
                  - buit_administratiu
                  - indeterminat
                  - pendent
      - name: confianca_score
        description: >
          Puntuació auditable 0-100 de fiabilitat (complementa la bandera
          `confianca`): mida del denominador + concordança dels senyals físics +
          cobertura − outlier. Etiqueta derivable (<45 baixa · 45–65 mitjana ·
          ≥65 alta). NULL on no hi ha tipus_territorial (~20 munis sense covariables).
          Vegeu docs/tipologia-municipal.md.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: kg_hab_any_year
        description: Any del tall de residus (traçabilitat temporal).
      - name: vidre_any
        description: Any del tall de la fracció vidre (traçabilitat temporal).

  - name: mart_consum_electric
    description: >
      Sèrie de consum elèctric DOMÈSTIC per municipi × any (format llarg, clau
      ine5+any_consum), Berguedà 2013–2024 (31×12 = 372 files). Font ICAEN
      8idm-becu, sector USOS DOMÈSTICS (l'únic que sobreviu al secret estadístic
      a micromunicipis). Proxy de presència per a "població real vs padró"
      (docs/poblacio-real-fonts.md). NO normalitzat: consum brut anual, fidel a
      la font; la normalització i el *gap* són síntesi de Talaia (fora d'aquest PR).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join amb mart_municipi).
        data_tests:
          - not_null
      - name: codi6
        description: Codi Idescat de 6 dígits (de mart_municipi).
        data_tests:
          - not_null
      - name: municipi
        description: Nom oficial del municipi.
        data_tests:
          - not_null
      - name: any_consum
        description: Any de la dada de consum (2013–2024).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 2013, max_value: 2024 }
      - name: consum_kwh_domestic
        description: Consum elèctric del sector USOS DOMÈSTICS (kWh/any).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 1000000000 }

  - name: mart_pols_mensual
    description: >
      El pols MENSUAL del municipi (C1 §1.1): format llarg, 1 fila per (ine5,
      date), date = "YYYY-MM" — primera taula mensual del catàleg. Família
      inaugural: atur_registrat (SEPE, sèrie des de 2006, els 947 municipis de
      Catalunya — filtre pel CATÀLEG sencer, mai per província: Gósol és Lleida
      25100 i Gombrèn és Girona 17080). Doctrina del «<5»: interval [1,4], mai
      zero ni NaN silenciós (atur_registrat NULL + min/max + atur_emmascarat).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join del contracte).
        data_tests:
          - not_null
      - name: codi6
        description: Codi Idescat de 6 dígits (del registre dels 947).
        data_tests:
          - not_null
      - name: municipi
        description: Nom oficial del municipi (registre versionat, no el del SEPE).
        data_tests:
          - not_null
      - name: date
        description: Mes de la dada, format "YYYY-MM" (C1 §1.1, fixat aquí).
        data_tests:
          - not_null
      - name: atur_registrat
        description: >
          Persones aturades registrades el darrer dia del mes. NULL quan la font
          serveix '<5' (mai s'inventa el punt: l'interval és la dada).
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 1000000 }
      - name: atur_registrat_min
        description: Extrem inferior de l'interval (= valor exacte, o 1 si emmascarat).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 1000000 }
      - name: atur_registrat_max
        description: Extrem superior de l'interval (= valor exacte, o 4 si emmascarat).
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 1000000 }
      - name: atur_emmascarat
        description: true = la font servia '<5' (secret estadístic SEPE des de 2022-01).
        data_tests:
          - not_null

  - name: mart_govern
    description: >
      Tauler de govern amb PROCEDÈNCIA (D4). Format llarg: 1 fila per (ine5, metric).
      Per a cada municipi de Catalunya i cada KPI OFICIAL i MESURAT del tauler (gorra
      §3): valor, rang «k de n» CONTRA LA COMARCA DEL MUNICIPI (partició per
      municipis-territori.json, autoritat ine5→comarca — mai una llista fixa: Gombrèn
      rankeja contra els 19 del Ripollès, no els 31 del Berguedà), n_amb_dada (el
      denominador honest = munis de la comarca amb la dada) i data (vintage del
      contracte). El rang es calcula AQUÍ (transform), mai al front (C6 §4); rank()
      descendent, empats comparteixen posició. 7 KPIs: index_envelliment, poblacio,
      pct_noprincipal, rtc_per_1000hab, kwh_hab, renda_neta_persona, kg_hab_any (els
      que són mesura oficial i comparables per comarca; origen/ETCA/atur/OSM en queden
      fora amb motiu, vegeu el capçal del model).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits.
        data_tests:
          - not_null
      - name: codi6
        description: Codi Idescat de 6 dígits (de mart_municipi).
        data_tests:
          - not_null
      - name: municipi
        description: Nom oficial del municipi (de mart_municipi).
        data_tests:
          - not_null
      - name: comarca
        description: Comarca del municipi (autoritat municipis-territori.json).
        data_tests:
          - not_null
      - name: metric
        description: Clau de mètrica del contracte (1:1 amb metrics.yml).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - index_envelliment
                  - poblacio
                  - pct_noprincipal
                  - rtc_per_1000hab
                  - kwh_hab
                  - renda_neta_persona
                  - kg_hab_any
      - name: valor
        description: Valor mesurat de la mètrica (NULL = sense dada oficial per aquest municipi).
      - name: rang
        description: >
          Posició «k» dins la comarca, rank() descendent pel valor (1 = el valor més alt).
          Els empats comparteixen posició. NULL quan valor és NULL (no es rankeja).
        data_tests:
          - between:
              arguments: { min_value: 1, max_value: 1000 }
      - name: n_amb_dada
        description: >
          Municipis de la comarca amb la dada (denominador del rang «k de n»). ≥1.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 1, max_value: 1000 }
      - name: data
        description: Vintage de la dada (any del contracte semantic/metrics.yml).
        data_tests:
          - not_null

  - name: mart_tendencia
    description: >
      La TENDÈNCIA amb el seu període declarat (E6 de les esmenes de Bea, doc
      docs/ajuntaments/tauler-v2-esmenes-bea.md §2). Format llarg: 1 fila per
      (ine5, metric, comparacio). Regla vinculant: «cap targeta amb fletxa sense
      període» — tota fila diu contra QUIN període compara, i la mètrica que no té
      sèrie hi surt EXPLÍCITA amb estat='sense_serie' + motiu escrit, mai absent i
      mai amb un NULL mut que el front pugui llegir com un zero. Amb sèrie real:
      atur (SEPE mensual, DUES comparacions — mes anterior i mateix mes de l'any
      anterior, perquè l'atur és estacional) i origen (Cens anual, finestra
      2021→2025 ja calculada a mart_demografia). Doctrina del «<5» propagada al
      delta: si un dels dos punts ve emmascarat, el delta és un INTERVAL
      (delta_min/delta_max) i delta = NULL.
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join del contracte).
        data_tests:
          - not_null
      - name: codi6
        description: Codi Idescat de 6 dígits.
        data_tests:
          - not_null
      - name: municipi
        description: Nom oficial del municipi.
        data_tests:
          - not_null
      - name: comarca
        description: Comarca del municipi (autoritat data/web/municipis-territori.json).
        data_tests:
          - not_null
      - name: metric
        description: Clau de mètrica del contracte semantic/metrics.yml.
        data_tests:
          - not_null
      - name: comparacio
        description: >
          Quina comparació és: 'mes_anterior' · 'mateix_mes_any_anterior' ·
          'finestra_anual'. NULL quan estat='sense_serie' (no hi ha comparació).
      - name: estat
        description: "'amb_serie' o 'sense_serie'. Mai NULL: és el camp que evita la fletxa muda."
        data_tests:
          - not_null
          - accepted_values:
              arguments: { values: ["amb_serie", "sense_serie"] }
      - name: motiu
        description: >
          Per què no hi ha sèrie (obligatori a tota fila 'sense_serie'; NULL a les
          'amb_serie'). És el text que la targeta pot mostrar en lloc de la fletxa.
      - name: periode_actual
        description: Període del valor actual ("YYYY-MM" per a l'atur, "YYYY" per a l'origen).
      - name: periode_anterior
        description: Període CONTRA EL QUAL es compara. Sense això no es pinta cap tendència.
      - name: valor_actual
        description: Valor del període actual. NULL si la font l'emmascara («<5»).
      - name: valor_anterior
        description: Valor del període de comparació. NULL si la font l'emmascara.
      - name: delta
        description: >
          valor_actual − valor_anterior, EXACTE. NULL si algun dels dos punts ve
          emmascarat (llavors la diferència és un interval, no un número) o si no hi ha sèrie.
      - name: delta_min
        description: Extrem inferior del delta (= actual_min − anterior_max). Amb sèrie, sempre present.
      - name: delta_max
        description: Extrem superior del delta (= actual_max − anterior_min). Amb sèrie, sempre present.
      - name: delta_emmascarat
        description: true = algun dels dos punts venia «<5» → el delta és un interval.
        data_tests:
          - not_null
      - name: unitat_delta
        description: "'persones' o 'punts_percentuals'. NULL quan no hi ha sèrie."
      - name: direccio
        description: >
          'puja' · 'baixa' · 'igual' · 'indeterminat' · NULL. Amb delta exacte, el seu
          signe. Amb delta emmascarat, el signe només si l'interval NO travessa el zero
          (llavors està provat); si el travessa, 'indeterminat' explícit. NULL només
          quan estat='sense_serie'.
        data_tests:
          - accepted_values:
              arguments: { values: ["puja", "baixa", "igual", "indeterminat"] }

  - name: mart_electoral
    description: >
      Resultats electorals agregats per municipi (clau ine5), Parlament de
      Catalunya 2024 (A20241) i 2021 (A20211), Berguedà. Columnes amb sufix de
      convocatòria. Percentatges sobre vot vàlid (suma de candidatures).
      LECTURA ECOLÒGICA: agregat municipal, NO individual (falàcia ecològica);
      volàtil en micromunicipis. Classificació de blocs (extrema dreta / indep /
      esquerra) segons la metodologia de Talaia; vegeu bitàcora. Ancoratge
      verificat (Castellar 08052, 2024): guanya=CAT-JUNTS+, pct_indep≈84,
      pct_extrema_dreta≈27 (Vox + Aliança Catalana).
    columns:
      - name: ine5
        description: Codi INE de 5 dígits (clau de join amb mart_municipi; crosswalk aplicat).
        data_tests:
          - unique
          - not_null
      - name: municipi
        description: Nom oficial del municipi (de mart_municipi).
        data_tests:
          - not_null
      # --- Parlament 2024 ---
      - name: vots_valids_A20241
        description: Vot vàlid (suma de candidatures) · Parlament 2024.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pct_extrema_dreta_A20241
        description: "% extrema dreta (Vox + Aliança Catalana + PxC…) sobre vot vàlid · 2024."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_indep_A20241
        description: "% bloc independentista sobre vot vàlid · 2024."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_esq_A20241
        description: "% bloc d'esquerra sobre vot vàlid · 2024."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: guanya_A20241
        description: Candidatura més votada (sigla) · 2024.
        data_tests:
          - not_null
      # --- Parlament 2021 ---
      - name: vots_valids_A20211
        description: Vot vàlid (suma de candidatures) · Parlament 2021.
        data_tests:
          - not_null
          - between:
              arguments: { min_value: 0, max_value: 10000000 }
      - name: pct_extrema_dreta_A20211
        description: "% extrema dreta sobre vot vàlid · 2021."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_indep_A20211
        description: "% bloc independentista sobre vot vàlid · 2021."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: pct_esq_A20211
        description: "% bloc d'esquerra sobre vot vàlid · 2021."
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 100 }
      - name: guanya_A20211
        description: Candidatura més votada (sigla) · 2021.
        data_tests:
          - not_null
