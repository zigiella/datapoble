name: gen fitxa (manual)

# Pipeline de generació de la lectura de fitxa (§3): escriptor opus-4.8 (es) → traductor
# sonnet-4.6 (ca). Manual (workflow_dispatch) perquè usa el secret OPENROUTER_API_KEY i té cost.
# Sortides (es + ca) com a artifact; res es committeja.

on:
  workflow_dispatch:
    inputs:
      args:
        description: "args per gen_fitxa.py (p.ex. '--muni 08052'). Buit = 3 munis."
        required: false
        default: ""

jobs:
  gen:
    name: gen fitxa (es writer + ca translator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate readings
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PYTHONUTF8: "1"
          ARGS: ${{ github.event.inputs.args }}
        run: python tools/gen_fitxa.py $ARGS
      - name: Upload outputs (es + ca)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gen-fitxa-outputs
          path: data/eval/
          if-no-files-found: warn
