[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datapoble-geo-rag"
version = "0.1.0"
description = "Geospatial-RAG substrate (DuckDB) for the 31 Berguedà municipalities — isolated Phase 0a experiment."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Talaia", email = "talaia@datapoble.local" }]
dependencies = [
    "duckdb>=1.0",
]

[project.optional-dependencies]
# Local dev / CI.
dev = [
    "pytest>=8.0",
]
# Phase-0b embeddings (local model). Heavy (torch) and OPTIONAL — this extra NEVER
# reaches the Render image (that builds only packages/ai), so torch stays out of
# production. On Linux/CI install via requirements-embeddings.txt to force the CPU
# torch wheel (PyPI's torch on Linux is the ~2.5 GB CUDA build). See README.
embeddings = [
    "torch==2.12.1",
    "sentence-transformers==5.6.0",
]
# Capa generativa (contracte 08; LLM VIA OPENROUTER — decisió de Bea 2026-07-03; mateix
# patró que packages/ai: openai SDK + base_url d'OpenRouter). OPTIONAL and NEVER in the
# Render image (that builds only packages/ai). Pure-Python + tiny.
# Key at runtime via the OPENROUTER_API_KEY env var (a gitignored .env; never in this
# public repo). Default models (slugs): generator anthropic/claude-sonnet-5, blind
# validator anthropic/claude-haiku-4.5 (temperature=0); provider pinned to Anthropic
# (allow_fallbacks=false). See README.
generativa = [
    "openai==2.44.0",
]

[project.scripts]
datapoble-geo-rag = "datapoble_geo_rag.build:main"

[tool.hatch.build.targets.wheel]
packages = ["src/datapoble_geo_rag"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"

[tool.ruff]
src = ["src"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",
]
