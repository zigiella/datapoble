version: 2

models:
  - name: stg_rtc
    description: Establiments RTC del Berguedà (1 fila/establiment), ine5 derivat.
    columns:
      - name: ine5
        data_tests: [not_null]
  - name: stg_residus
    description: >
      Residus municipals del Berguedà (1 fila/municipi×any). Inclou kg_hab_any
      (càrrega total) i vidre_tones (fracció vidre en tones/any, proxy hostaleria).
    columns:
      - name: ine5
        data_tests: [not_null]
  - name: stg_idescat_emex
    description: Indicadors EMEX pivotats (1 fila/municipi). 31 esperats.
    columns:
      - name: ine5
        data_tests:
          - not_null
          - unique
  - name: stg_electoral
    description: >
      Vots electorals del Berguedà (1 fila/convocatòria×municipi×candidatura),
      nivell Municipi. ine5 via crosswalk; sigla_norm normalitzada. Lectura ecològica.
    columns:
      - name: ine5
        data_tests: [not_null]
      - name: vots
        data_tests: [not_null]
  - name: stg_icaen_consum
    description: >
      Consum elèctric ICAEN (8idm-becu) del Berguedà, 1 fila/municipi×any×sector,
      sèrie 2013–2024. ine5 derivat de cdmun. Tots els sectors (consum_kwh NULL si
      secret estadístic); la selecció del sector USOS DOMÈSTICS es fa a mart.
    columns:
      - name: ine5
        data_tests: [not_null]
      - name: any_consum
        data_tests: [not_null]
