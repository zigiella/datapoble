<!doctype html>
<!-- lang l'injecta el hook de servidor (transformPageChunk) segons el locale actiu -->
<html lang="%paraglide.lang%">
	<head>
		<meta charset="utf-8" />
		<!-- Favicon: SVG modern com a principal + ICO de reserva (navegadors sense suport SVG).
		     L'ICO ve de design-system/brand (16/32/48). Així es veu a la pestanya arreu. -->
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="alternate icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<!-- ⚠️ PRE-LLANÇAMENT: bloqueja la indexació fins que el lloc estigui llest.
		     TREURE aquesta meta al llançament (+ ajustar static/robots.txt i static/_headers). -->
		<meta name="robots" content="noindex, nofollow" />
		<!-- Anti-FOUC del tema: fixa data-theme a <html> ABANS del primer pintat, llegint
		     la tria desada (rdg-theme) o la preferència del sistema. El commutador (sol/lluna)
		     l'actualitza després; sense això, el mode fosc parpellejaria a clar en carregar. -->
		<script>
			(function () {
				try {
					var t = localStorage.getItem('rdg-theme');
					if (t !== 'light' && t !== 'dark') {
						t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					}
					document.documentElement.setAttribute('data-theme', t);
				} catch (e) {}
			})();
		</script>
		<!-- Tipografia de marca (design-system): Archivo (display 700/800), Inter (UI/dada,
		     cifres tabulars), IBM Plex Serif (missió del peu), IBM Plex Mono (procedència).
		     Diacrítiques catalanes. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
